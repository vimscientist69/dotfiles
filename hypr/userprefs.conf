# Set your personal hyprland configuration here

input {
	kb_variant = dvorak
	scroll_factor = 0.5
	natural_scroll = true
	sensitivity = -0.5
	repeat_delay = 300
}

general {
	gaps_in = 7.5
	gaps_out = 15 
}

xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
env = GDK_SCALE,2
env = XCURSOR_SIZE,32

debug {
	disable_logs = true
}
